name: Publish APT Packages

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to publish (for example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish-apt:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Cloudsmith configuration
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDSMITH_API_KEY}" ]; then
            echo "Secret CLOUDSMITH_API_KEY is required."
            exit 1
          fi

      - name: Download release .deb assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "*.deb" \
            --dir dist
          ls -1 dist/*.deb >/dev/null

      - name: Install Cloudsmith CLI
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install cloudsmith-cli==1.11.1

      - name: Publish to Cloudsmith APT repository
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          CLOUDSMITH_REPO: openclaw/slacrawl
          CLOUDSMITH_APT_TARGETS: ${{ vars.CLOUDSMITH_APT_TARGETS }}
          CLOUDSMITH_DISTRIBUTION: ${{ vars.CLOUDSMITH_DISTRIBUTION }}
          CLOUDSMITH_RELEASE: ${{ vars.CLOUDSMITH_RELEASE }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          APT_TARGETS="${CLOUDSMITH_APT_TARGETS:-}"
          packages=(dist/*.deb)
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "::error::No .deb packages found in dist."
            exit 1
          fi

          if [ -z "${APT_TARGETS}" ]; then
            if [ -n "${CLOUDSMITH_DISTRIBUTION:-}" ] && [ -n "${CLOUDSMITH_RELEASE:-}" ]; then
              APT_TARGETS="${CLOUDSMITH_DISTRIBUTION}/${CLOUDSMITH_RELEASE}"
            else
              APT_TARGETS="ubuntu/jammy,debian/trixie"
            fi
          fi

          for target_path in $(printf '%s' "${APT_TARGETS}" | tr ',' ' '); do
            [ -z "${target_path}" ] && continue
            TARGET="${CLOUDSMITH_REPO}/${target_path}"
            for pkg in "${packages[@]}"; do
              cloudsmith push deb "${TARGET}" "${pkg}" --no-wait-for-sync
            done
          done
